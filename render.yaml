services:
  - type: web
    name: quincaillerie-pro-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm run render:build
    startCommand: npm run start
    envVars:
      # Connexion poolée Supabase (port 6543, transaction pooler) — utilisée à l'exécution
      - key: DATABASE_URL
        sync: false
      # Connexion directe Supabase (port 5432) — utilisée uniquement pour prisma db push / migrate
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://votre-app.vercel.app
      - key: PORT
        value: 4000
